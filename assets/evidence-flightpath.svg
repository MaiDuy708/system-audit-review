<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title description">
  <title id="title">System Audit Review evidence flightpath</title>
  <desc id="description">A five-stage evidence-led audit flow ending in a verified report.</desc>
  <defs>
    <linearGradient id="field" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#07121c"/>
      <stop offset="1" stop-color="#102c31"/>
    </linearGradient>
    <linearGradient id="route" x1="0" x2="1">
      <stop stop-color="#ff9a7a"/>
      <stop offset=".5" stop-color="#e8c66a"/>
      <stop offset="1" stop-color="#64d7b1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="540" rx="28" fill="url(#field)"/>
  <g fill="none" stroke="#d6e8e7" stroke-opacity=".12">
    <path d="M48 105H1152M48 205H1152M48 305H1152M48 405H1152"/>
    <path d="M120 48V492M360 48V492M600 48V492M840 48V492M1080 48V492"/>
  </g>
  <text x="64" y="84" fill="#e8f5f2" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" letter-spacing="4">MAIDUY / SYSTEM AUDIT REVIEW</text>
  <text x="64" y="122" fill="#8eb5b3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" letter-spacing="1.5">EVIDENCE FLIGHTPATH · READ-ONLY BY DEFAULT</text>
  <path d="M126 336 C236 226 312 390 414 302 S600 242 672 326 S832 392 926 262 S1064 204 1090 258" fill="none" stroke="url(#route)" stroke-width="8" stroke-linecap="round"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <g transform="translate(92 336)">
      <circle r="26" fill="#ff9a7a"/><text x="-8" y="6" fill="#07121c" font-size="17" font-weight="700">01</text>
      <text x="-28" y="66" fill="#e8f5f2" font-size="16">SCOPE</text><text x="-48" y="91" fill="#8eb5b3" font-size="13">permission boundary</text>
    </g>
    <g transform="translate(355 322)">
      <circle r="26" fill="#efc76b"/><text x="-8" y="6" fill="#07121c" font-size="17" font-weight="700">02</text>
      <text x="-47" y="66" fill="#e8f5f2" font-size="16">CENSUS</text><text x="-72" y="91" fill="#8eb5b3" font-size="13">coverage, not samples</text>
    </g>
    <g transform="translate(610 299)">
      <circle r="26" fill="#c7d77a"/><text x="-8" y="6" fill="#07121c" font-size="17" font-weight="700">03</text>
      <text x="-48" y="66" fill="#e8f5f2" font-size="16">TRACE</text><text x="-89" y="91" fill="#8eb5b3" font-size="13">intent to durable readback</text>
    </g>
    <g transform="translate(881 322)">
      <circle r="26" fill="#91d5a4"/><text x="-8" y="6" fill="#07121c" font-size="17" font-weight="700">04</text>
      <text x="-51" y="66" fill="#e8f5f2" font-size="16">FALSIFY</text><text x="-82" y="91" fill="#8eb5b3" font-size="13">negative-space checks</text>
    </g>
    <g transform="translate(1090 258)">
      <circle r="26" fill="#64d7b1"/><text x="-8" y="6" fill="#07121c" font-size="17" font-weight="700">05</text>
      <text x="-63" y="66" fill="#e8f5f2" font-size="16">VERIFY</text><text x="-105" y="91" fill="#8eb5b3" font-size="13">ledger-backed report</text>
    </g>
  </g>
  <text x="64" y="472" fill="#d6e8e7" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">A conclusion is only as strong as the evidence that survives a hostile readback.</text>
</svg>
