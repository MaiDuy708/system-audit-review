name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - name: Check whitespace
        run: |
          if git rev-parse --verify -q HEAD^ >/dev/null; then
            git diff --check HEAD^ HEAD
          else
            echo "No parent commit; skipping whitespace diff check"
          fi
      - name: Check release scripts
        run: bash -n scripts/install.sh scripts/package.sh
      - name: Compile-check Python
        run: python3 -m py_compile scripts/validate.py scripts/audit_gate.py scripts/probes/*.py
      - name: Validate package (includes gate self-test)
        run: python3 scripts/validate.py
